<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">

    <title>Bestellsystem</title>

    <!-- Einkopieren der Schriftart -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- style = css, Formatierungen -->
    <style>
        body {
            font-family: "Open Sans", sans-serif;

            padding-left: 50px;
            padding-right: 50px;
        }

        h1 {
            margin-top: 140px;
            color: #525252;

        }

        p {
            color: #5252529e;
        }

        .wave {
            position: absolute;
            left: 0;
            top: 0;
            z-index: -1;
            height: 200px;
            width: 100%;
            /* Darf abgeschnitten werden  */
            object-fit: cover;
        }

        a {
            color: white;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .nav {
            margin-top: 20px;
        }

        .social-icons {
            position: absolute;
            right: 50px;
            top: 20px;
        }

        .social-icon {
            width: 30px;
        }

        .main-image {
            width: 100%;
        }

        .logo {
            position: absolute;
            left: 0;
            width: 100px;
            top: 16px;
            left: 16px;

        }

        .mail {
            color: white;
            background-color: black;
            padding: 8px;
            display: inline-block;
            border-radius: 8px;
            margin-bottom: 16px;
            margin-top: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .mail:hover {
            text-decoration: none;
            background-color: rgb(83, 81, 81);
        }

        .mail-icon {
            height: 16px;
            margin-right: 4px;
        }
    </style>
</head>

<body>
    <img class="logo" src="img/HochschuleEsslingen.svg" alt="">
    <img class="wave" src="img/wave.svg" alt="Wellenform">
    <!-- Die Links oben links -->
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="https://google.de">Google</a>
        <a href="kontakt.html">Kontakt</a>
        <a href="">Impressum</a>
    </div>
    <!-- Social Media Kanäle -->
    <div class="social-icons">
        <a href="https://instagram.com/google">
            <img class="social-icon" src="img/insta.svg" alt="">
        </a>

        <a href="https://youtube.com/google">
            <img class="social-icon" src="img/youtube.svg" alt="">
        </a>‚
    </div>
